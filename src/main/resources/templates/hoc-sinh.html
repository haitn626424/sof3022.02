<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hoc Sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<form method="post" action="/hocsinhs/add" th:object="${hocSinh}">
    <table>
        <tr>
            <td>Họ Tên</td>
            <td><input type="text" th:field="*{hoTen}"></td>
        </tr>
        <tr>
            <td>Giới Tính</td>
            <td>
                <input type="radio" th:field="*{gioiTinh}" value="true">Nam
                <input type="radio" th:field="*{gioiTinh}" value="false">Nữ
            </td>
        </tr>
        <tr>
            <td>Địa Chỉ</td>
            <td>
                <input type="text" th:field="*{diaChi}"></td>
            </td>
        </tr>
        <tr>
            <td>Ten Lớp Học</td>
            <td>
                <select th:field="*{lopHoc.id}">
                    <option th:each="lopHoc : ${listLopHocs}" th:value="${lopHoc.id}" th:text="${lopHoc.tenLop}"></option>
                </select>
            </td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Add"></td>
        </tr>
    </table>
</form>
<table>
    <thead>
    <tr>
        <th>Stt</th>
        <th>Họ Tên</th>
        <th>Giới Tính</th>
        <th>Địa Chỉ</th>
        <th>Tên Lớp Học</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="hocSinh,index : ${listHocSinhs}">
        <td th:text="${index.index+1}"></td>
        <td th:text="${hocSinh.hoTen}"></td>
        <td th:text="${hocSinh.gioiTinh ? 'Nam' : 'Nữ'}"></td>
        <td th:text="${hocSinh.diaChi}"></td>
        <td th:text="${hocSinh.lopHoc.tenLop}"></td>
        <td>
            <a th:href="@{/hocsinhs/view-update/{id}(id=${hocSinh.id})}">Update</a>
        </td>
    </tr>
    </tbody>
</table>
<div class="pagination" th:if="${totalPages > 0}">
    <a th:href="@{/hocsinhs/hien-thi(page=0)}"
       th:classappend="${currentPage == 0} ? 'disabled'"
       class="page-item">
        First
    </a>

    <a th:href="@{/hocsinhs/hien-thi(page=${currentPage - 1})}"
       th:classappend="${currentPage == 0} ? 'disabled'"
       class="page-item">
        Previous</a>

    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
       th:classappend="${i == currentPage ? 'active' : ''}"
       th:text="${i + 1}"
       th:href="@{/hocsinhs/hien-thi(page=${i})}"
       class="page-item">
        ></a>

    <a th:href="@{/hocsinhs/hien-thi(page=${currentPage + 1})}"
       th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
       class="page-item">
        Next</a>
    <a th:href="@{/hocsinhs/hien-thi(page=${totalPages - 1})}"
       th:classappend="${currentPage == totalPages - 1} ? 'disabled'"
       class="page-item">
        Last
    </a>
</div>
</body>
<style>
    .pagination{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .page-item{
        text-decoration: none;
        padding: 5px;
    }
    .page-item.disabled {
        color: #999;
        pointer-events: none;
        background: #f5f5f5;
        cursor: not-allowed;
    }
</style>
</html>
