<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
</head>
<body>
<form method="post" action="/users/add" th:object="${user}">
    <table>
        <tr>
            <td>FullName</td>
            <td><input type="text" th:field="*{fullName}"></td>
        </tr>
        <tr>
            <td>Email</td>
            <td><input type="text" th:field="*{email}"></td>
        </tr>
        <tr>
            <td>Phone</td>
            <td><input type="text" th:field="*{phone}"></td>
        </tr>
        <tr>
            <td>Password</td>
            <td><input type="password" th:field="*{password}"></td>
        </tr>
        <tr>
            <td>Role</td>
            <td>
                <input type="radio" th:field="*{role}" value="true">Admin
                <input type="radio" th:field="*{role}" value="false">NhanVien
            </td>
        </tr>
        <tr>
            <td>Active</td>
            <td>
                <input type="radio" th:field="*{active}" value="true">hoat dong
                <input type="radio" th:field="*{active}" value="false">khong hoat dong
            </td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Add"></td>
        </tr>
    </table>
</form>
 <table>
     <thead>
     <tr>
         <th>Stt</th>
         <th>Email</th>
         <th>fullName</th>
         <th>Phone</th>
         <th>Role</th>
         <th>Active</th>
         <th>Action</th>
     </tr>
     </thead>
     <tbody >
      <tr th:each=" user,index : ${listUsers}">
          <td th:text="${index.index+1}"></td>
          <td th:text="${user.email}"></td>
          <td th:text="${user.fullName}"></td>
          <td th:text="${user.phone}"></td>
          <td th:text="${user.role}"></td>
          <td th:text="${user.active}"></td>
          <td>
              <a th:href="@{|/users/xoa?id=${user.id}|}">Xóa</a>
          </td>
      </tr>
     </tbody>
 </table>
</body>
</html>
